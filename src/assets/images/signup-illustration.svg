<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background shape -->
  <rect width="300" height="400" rx="20" fill="#F8F9FA"/>
  
  <!-- Phone outline -->
  <rect x="100" y="80" width="100" height="200" rx="15" fill="#FFFFFF" stroke="#4361EE" stroke-width="3"/>
  
  <!-- Phone screen -->
  <rect x="105" y="95" width="90" height="170" rx="5" fill="#E6F0FF"/>
  
  <!-- User icon circle -->
  <circle cx="150" cy="140" r="25" fill="#4361EE"/>
  
  <!-- User icon -->
  <circle cx="150" cy="135" r="12" fill="#FFFFFF"/>
  <path d="M130 160C130 150 140 145 150 145C160 145 170 150 170 160" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Form lines -->
  <rect x="120" y="180" width="60" height="6" rx="3" fill="#FFFFFF"/>
  <rect x="120" y="195" width="60" height="6" rx="3" fill="#FFFFFF"/>
  <rect x="120" y="210" width="60" height="6" rx="3" fill="#FFFFFF"/>
  
  <!-- Hand holding phone -->
  <path d="M180 280C180 280 200 270 210 290C220 310 240 320 240 320" stroke="#4361EE" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 290C100 290 80 270 70 290C60 310 40 330 40 330" stroke="#4361EE" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 280C100 280 120 320 150 320C180 320 200 280 200 280" stroke="#4361EE" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Dots decoration -->
  <circle cx="50" cy="100" r="5" fill="#4361EE" opacity="0.5"/>
  <circle cx="60" cy="120" r="3" fill="#4361EE" opacity="0.3"/>
  <circle cx="40" cy="130" r="4" fill="#4361EE" opacity="0.4"/>
  
  <circle cx="250" cy="100" r="5" fill="#4361EE" opacity="0.5"/>
  <circle cx="240" cy="120" r="3" fill="#4361EE" opacity="0.3"/>
  <circle cx="260" cy="130" r="4" fill="#4361EE" opacity="0.4"/>
  
  <!-- Success checkmark -->
  <circle cx="230" cy="180" r="15" fill="#4361EE"/>
  <path d="M223 180L228 185L237 176" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>